<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <link rel="icon" href="images/unnamed (1).webp" type="image/x-icon" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <title>&#1587;&#1608;&#1585;&#1577;</title> -->
    <title>Quran Kareem</title>
    <style>
      body {
        background-color: #1e1f22;
        margin: auto;
        padding: 30px 20px;
        text-align: center;
        font-family: system-ui, Avenir, Helvetica, Arial, sans-serif;
        color: #fff;
      }

      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: rgb(96, 165, 250);
        text-decoration: none;
        font-size: 0.9rem;
        margin-bottom: 20px;
        border: 1px solid rgba(59, 130, 246, 0.2);
        padding: 6px 14px;
        border-radius: 20px;
        background-color: #17255466;
        transition: 0.3s;
      }

      .back-btn:hover {
        background-color: rgba(59, 130, 246, 0.1);
        border-color: rgb(59, 130, 246);
      }

      .box-start {
        margin: auto;
        background-color: #14214966;
        margin-bottom: 30px;
        width: 700px;
        max-width: 100%;
        box-sizing: border-box;
        overflow: hidden;
        padding: 30px;
        position: relative;
        border-radius: 20px;
        border: 0.1px solid rgb(33, 57, 97);
      }

      .sura-name {
        font-size: 2.5rem;
        color: #fff;
        margin: 0;
      }

      .sura-info {
        color: rgb(96, 165, 250);
        font-size: 1rem;
        margin-top: 8px;
      }

      .ayat-container {
        max-width: 850px;
        margin: auto;
      }

      .quran-page {
        background-color: #151922;
        border: 1px solid rgb(31, 41, 55);
        border-radius: 14px;
        padding: 30px;
        text-align: justify;
        color: #f3f4f6;
      }

      .bismillah {
        display: block;
        text-align: center;
        color: #ffffff;
        font-size: 1.9rem;
        line-height: 2.2;
        margin-bottom: 25px;
        font-family: "Traditional Arabic", "Amiri", serif;
        font-weight: 700;
      }

      .aya-text {
        font-family: "Traditional Arabic", "Amiri", serif;
        font-size: 1.75rem;
        line-height: 2.45;
        word-spacing: 4px;
      }

      .aya-number {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 31px;
        height: 31px;
        margin: 0 7px;
        border-radius: 50%;
        background-color: #17255466;
        border: 1px solid rgba(59, 130, 246, 0.35);
        color: rgb(96, 165, 250);
        font-size: 0.85rem;
        font-family: ui-monospace, monospace;
        vertical-align: middle;
      }

      .loading,
      .error {
        color: rgb(96, 165, 250);
        font-size: 1.2rem;
        margin-top: 50px;
      }

      .error {
        color: #f87171;
      }

      @media (max-width: 600px) {
        body {
          padding: 22px 12px;
        }

        .box-start {
          padding: 24px 16px;
          border-radius: 16px;
        }

        .sura-name {
          font-size: 2rem;
        }

        .quran-page {
          padding: 20px 16px;
        }

        .bismillah {
          font-size: 1.55rem;
        }

        .aya-text {
          font-size: 1.45rem;
          line-height: 2.35;
          word-spacing: 2px;
        }
      }
    </style>
  </head>

  <body>
    <a href="index.html" class="back-btn"
      >&#8592; &#1575;&#1604;&#1593;&#1608;&#1583;&#1577;
      &#1604;&#1604;&#1585;&#1574;&#1610;&#1587;&#1610;&#1577;</a
    >

    <div class="box-start">
      <h1 class="sura-name" id="sura-name">
        &#1580;&#1575;&#1585;&#1610;
        &#1575;&#1604;&#1578;&#1581;&#1605;&#1610;&#1604;...
      </h1>
      <p class="sura-info" id="sura-info"></p>
    </div>

    <div class="ayat-container" id="ayat-container">
      <p class="loading">
        &#1580;&#1575;&#1585;&#1610; &#1578;&#1581;&#1605;&#1610;&#1604;
        &#1575;&#1604;&#1587;&#1608;&#1585;&#1577;...
      </p>
    </div>

    <script>
      const id = new URLSearchParams(window.location.search).get("id") || "1";
      const bismillah =
        "\u0628\u0650\u0633\u0652\u0645\u0650 \u0627\u0644\u0644\u0651\u064e\u0647\u0650 \u0627\u0644\u0631\u0651\u064e\u062d\u0652\u0645\u064e\u0670\u0646\u0650 \u0627\u0644\u0631\u0651\u064e\u062d\u0650\u064a\u0645\u0650";

      fetch(`https://api.alquran.cloud/v1/surah/${id}`)
        .then((res) => res.json())
        .then((data) => {
          const sura = data.data;
          const container = document.getElementById("ayat-container");
          const page = document.createElement("div");
          const text = document.createElement("div");

        //   document.title =  sura.name;
          document.getElementById("sura-name").textContent = sura.name;
          document.getElementById("sura-info").textContent =
            "\u0639\u062f\u062f \u0627\u0644\u0622\u064a\u0627\u062a: " +
            sura.numberOfAyahs +
            " | " +
            (sura.revelationType === "Meccan"
              ? "\u0645\u0643\u064a\u0629"
              : "\u0645\u062f\u0646\u064a\u0629");

          container.innerHTML = "";
          page.className = "quran-page";
          text.className = "aya-text";

          if (sura.number !== 1 && sura.number !== 9) {
            const basmala = document.createElement("span");
            basmala.className = "bismillah";
            basmala.textContent = bismillah;
            page.appendChild(basmala);
          }

          sura.ayahs.forEach((aya) => {
            const ayaText = document.createTextNode(
              removeBismillah(aya.text, sura.number, aya.numberInSurah),
            );
            const ayaNumber = document.createElement("span");

            ayaNumber.className = "aya-number";
            ayaNumber.textContent = aya.numberInSurah;

            text.appendChild(ayaText);
            text.appendChild(ayaNumber);
          });

          page.appendChild(text);
          container.appendChild(page);
        })
        .catch(() => {
          document.getElementById("ayat-container").innerHTML =
            '<p class="error">&#1581;&#1583;&#1579; &#1582;&#1591;&#1571; &#1601;&#1610; &#1578;&#1581;&#1605;&#1610;&#1604; &#1575;&#1604;&#1587;&#1608;&#1585;&#1577;&#1548; &#1578;&#1581;&#1602;&#1602; &#1605;&#1606; &#1575;&#1604;&#1575;&#1578;&#1589;&#1575;&#1604; &#1576;&#1575;&#1604;&#1573;&#1606;&#1578;&#1585;&#1606;&#1578;</p>';
        });

      function removeBismillah(text, suraNumber, ayaNumber) {
        if (suraNumber === 1 || suraNumber === 9 || ayaNumber !== 1) {
          return text;
        }

        const words = text.trim().split(/\s+/);

        if (words.length > 4) {
          return words.slice(4).join(" ");
        }

        return text;
      }
    </script>
  </body>
</html>
